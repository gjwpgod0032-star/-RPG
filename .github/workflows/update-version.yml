name: Update Version JSON

on:
  push:
    paths:
      - 'index.html'

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from index.html
        id: extract
        run: |
          VERSION=$(grep -o "GAME_VERSION = '[^']*'" index.html | grep -o "'[^']*'" | tr -d "'")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Update version.json
        run: |
          cat > version.json << JSONEOF
          {
            "version": "${{ steps.extract.outputs.version }}"
          }
          JSONEOF
          echo "version.json updated:"
          cat version.json

      - name: Commit version.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git diff --staged --quiet || git commit -m "chore: update version.json to ${{ steps.extract.outputs.version }}"
          git push
